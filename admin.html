<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kursų redagavimas — vienaslitas.lt</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --blue-900:#0b1d35;
    --blue-800:#0f2444;
    --paper:#f3ecdd;
    --paper-deep:#ece3cf;
    --brass:#c9a227;
    --rust:#c97520;
    --ink:#15120d;
    --line:#d6ccb8;
    --radius:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  .topbar{
    background:var(--blue-900);
    color:var(--paper);
    padding:0 28px;
    height:60px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .brand{
    font-family:'Fraunces',serif;
    font-size:18px;
    font-weight:600;
  }
  .brand span{color:var(--brass);}
  .topbar-tag{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:rgba(243,236,221,0.5);
  }
  .container{
    max-width:820px;
    margin:0 auto;
    padding:40px 24px 80px;
  }
  h1{
    font-family:'Fraunces',serif;
    font-size:26px;
    font-weight:600;
    margin-bottom:6px;
    letter-spacing:-0.01em;
  }
  .subtitle{
    font-size:14px;
    color:#6b6354;
    margin-bottom:32px;
  }

  /* Token section */
  .token-card{
    background:var(--paper-deep);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:24px;
    margin-bottom:32px;
  }
  .token-card label{
    display:block;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:#6b6354;
    margin-bottom:8px;
  }
  .token-row{
    display:flex;
    gap:10px;
  }
  .token-row input{
    flex:1;
    font-family:'JetBrains Mono',monospace;
    font-size:13px;
    padding:10px 14px;
    border:1px solid var(--line);
    border-radius:8px;
    background:#fff;
    color:var(--ink);
    outline:none;
  }
  .token-row input:focus{border-color:var(--blue-800);}
  .token-saved{
    display:flex;
    align-items:center;
    gap:12px;
    font-size:13.5px;
  }
  .token-saved .ok{
    color:#1a6b3a;
    font-weight:600;
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    letter-spacing:0.05em;
  }
  .link-btn{
    background:none;
    border:none;
    color:#6b6354;
    font-size:12.5px;
    cursor:pointer;
    text-decoration:underline;
    padding:0;
    font-family:inherit;
  }
  .link-btn:hover{color:var(--rust);}

  /* Rates table */
  .table-wrap{
    border:1px solid var(--line);
    border-radius:var(--radius);
    overflow:hidden;
    margin-bottom:24px;
  }
  table{
    width:100%;
    border-collapse:collapse;
    background:#fff;
  }
  thead th{
    text-align:left;
    font-family:'JetBrains Mono',monospace;
    font-size:10.5px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    font-weight:600;
    color:#6b6354;
    padding:12px 16px;
    border-bottom:1px solid var(--line);
    background:var(--paper-deep);
  }
  thead th.c{text-align:center;}
  tbody tr{border-bottom:1px solid var(--line);}
  tbody tr:last-child{border-bottom:none;}
  tbody tr:hover{background:#faf7f0;}
  td{padding:10px 16px;vertical-align:middle;}
  .code{
    font-family:'JetBrains Mono',monospace;
    font-weight:700;
    font-size:13px;
    color:var(--blue-900);
  }
  .cname{font-size:12.5px;color:#6b6354;margin-top:2px;}
  td.c{text-align:center;}
  .rate-input{
    font-family:'JetBrains Mono',monospace;
    font-size:14px;
    font-weight:600;
    width:90px;
    padding:7px 10px;
    border:1px solid var(--line);
    border-radius:6px;
    text-align:center;
    background:var(--paper-deep);
    color:var(--ink);
    outline:none;
    transition:border-color 0.15s;
  }
  .rate-input:focus{border-color:var(--blue-800);background:#fff;}
  .rate-input.sell{background:#fff5f5;}
  .rate-input.sell:focus{border-color:var(--rust);}

  /* Publish button */
  .actions{display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
  .btn-publish{
    font-family:'JetBrains Mono',monospace;
    font-weight:600;
    font-size:14px;
    letter-spacing:0.03em;
    padding:14px 28px;
    background:var(--blue-900);
    color:var(--paper);
    border:none;
    border-radius:999px;
    cursor:pointer;
    display:inline-flex;
    align-items:center;
    gap:9px;
    transition:background 0.2s;
  }
  .btn-publish:hover{background:var(--blue-800);}
  .btn-publish:disabled{opacity:0.5;cursor:not-allowed;}
  .btn-save-token{
    font-family:'JetBrains Mono',monospace;
    font-weight:600;
    font-size:13px;
    padding:10px 18px;
    background:var(--blue-900);
    color:var(--paper);
    border:none;
    border-radius:999px;
    cursor:pointer;
    white-space:nowrap;
  }
  .btn-save-token:hover{background:var(--blue-800);}

  /* Status */
  .status{
    font-size:13.5px;
    padding:12px 16px;
    border-radius:8px;
    display:none;
  }
  .status.info{display:block;background:#eaf0fb;color:#0f2444;border:1px solid #c0d0ea;}
  .status.success{display:block;background:#eafaf1;color:#1a5c38;border:1px solid #a8dfc0;}
  .status.error{display:block;background:#fdf0ee;color:#8b2316;border:1px solid #f0c0b8;}

  .hint{
    font-size:12.5px;
    color:#6b6354;
    line-height:1.6;
    margin-top:12px;
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">vienas<span>litas</span></div>
  <span class="topbar-tag">Kursų redagavimas</span>
</div>

<div class="container">
  <h1>Valiutų kursai</h1>
  <p class="subtitle">Pakeiskite skaičius ir paspauskite „Skelbti". Svetainė atsinaujins per ~1 minutę.</p>

  <!-- Token section -->
  <div class="token-card" id="tokenSection">
    <label>Prieigos raktažodis (GitHub token)</label>
    <div id="tokenInput" class="token-row">
      <input type="password" id="tokenField" placeholder="github_pat_…" autocomplete="off">
      <button class="btn-save-token" onclick="saveTokenClick()">Išsaugoti</button>
    </div>
    <div id="tokenSaved" class="token-saved" style="display:none;">
      <span class="ok">✓ Raktažodis išsaugotas</span>
      <button class="link-btn" onclick="resetToken()">Keisti raktažodį</button>
    </div>
  </div>

  <!-- Status -->
  <div class="status" id="status"></div>

  <!-- Rates table -->
  <div class="table-wrap" id="tableWrap" style="display:none;">
    <table>
      <thead>
        <tr>
          <th>Valiuta</th>
          <th class="c">Perkame</th>
          <th class="c">Parduodame</th>
        </tr>
      </thead>
      <tbody id="rateRows"></tbody>
    </table>
  </div>

  <!-- Publish -->
  <div class="actions" id="publishArea" style="display:none;">
    <button class="btn-publish" id="publishBtn" onclick="publish()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2L15 22 11 13 2 9l20-7z"/></svg>
      Skelbti kursus
    </button>
  </div>
  <p class="hint" id="publishHint" style="display:none;">Po paskelbimo svetainė atsinaujins automatiškai per ~1 minutę.</p>
</div>

<script>
  const REPO = 'MindaugasJucius/vienaslitas';
  const FILE = 'currencies.json';
  const API  = `https://api.github.com/repos/${REPO}/contents/${FILE}`;

  let fileSha = null;

  function getToken() { return localStorage.getItem('vl_token') || ''; }

  function saveTokenClick() {
    const val = document.getElementById('tokenField').value.trim();
    if (!val) return;
    localStorage.setItem('vl_token', val);
    showTokenSaved();
    loadRates();
  }

  function showTokenSaved() {
    document.getElementById('tokenInput').style.display = 'none';
    document.getElementById('tokenSaved').style.display  = 'flex';
  }

  function resetToken() {
    localStorage.removeItem('vl_token');
    document.getElementById('tokenField').value = '';
    document.getElementById('tokenInput').style.display = 'flex';
    document.getElementById('tokenSaved').style.display  = 'none';
    document.getElementById('tableWrap').style.display   = 'none';
    document.getElementById('publishArea').style.display = 'none';
    document.getElementById('publishHint').style.display = 'none';
    setStatus('', '');
  }

  function setStatus(msg, type) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'status' + (type ? ' ' + type : '');
  }

  function decodeB64(b64) {
    const binary = atob(b64.replace(/\n/g, ''));
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    return new TextDecoder().decode(bytes);
  }

  function encodeB64(str) {
    const bytes = new TextEncoder().encode(str);
    let binary = '';
    for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
    return btoa(binary);
  }

  async function loadRates() {
    setStatus('Kraunama…', 'info');
    let res;
    try {
      res = await fetch(API, {
        headers: { Authorization: `Bearer ${getToken()}`, Accept: 'application/vnd.github+json' }
      });
    } catch(e) {
      setStatus('Tinklo klaida. Patikrinkite interneto ryšį.', 'error');
      return;
    }
    if (res.status === 401) {
      setStatus('Neteisingas raktažodis. Įveskite teisingą ir bandykite dar kartą.', 'error');
      resetToken();
      return;
    }
    if (!res.ok) {
      setStatus(`Klaida: ${res.status}`, 'error');
      return;
    }
    const raw = await res.json();
    fileSha = raw.sha;
    const data = JSON.parse(decodeB64(raw.content));
    renderTable(data.currencies);
    setStatus('', '');
  }

  function renderTable(currencies) {
    const tbody = document.getElementById('rateRows');
    tbody.innerHTML = '';
    currencies.forEach(c => {
      const tr = document.createElement('tr');
      tr.dataset.code = c.code;
      tr.dataset.name = c.name;
      tr.innerHTML =
        `<td><div class="code">${c.code}</div><div class="cname">${c.name}</div></td>` +
        `<td class="c"><input class="rate-input buy-input" value="${c.buy}" inputmode="decimal"></td>` +
        `<td class="c"><input class="rate-input sell-input sell" value="${c.sell}" inputmode="decimal"></td>`;
      tbody.appendChild(tr);
    });
    document.getElementById('tableWrap').style.display   = 'block';
    document.getElementById('publishArea').style.display = 'flex';
    document.getElementById('publishHint').style.display = 'block';
  }

  async function publish() {
    const rows = document.querySelectorAll('#rateRows tr');
    const currencies = Array.from(rows).map(row => ({
      code: row.dataset.code,
      name: row.dataset.name,
      buy:  row.querySelector('.buy-input').value.trim(),
      sell: row.querySelector('.sell-input').value.trim(),
    }));
    const today = new Date().toISOString().slice(0, 10);
    const payload = JSON.stringify({ updated: today, currencies }, null, 2);

    const btn = document.getElementById('publishBtn');
    btn.disabled = true;
    setStatus('Skelbiama…', 'info');

    let res;
    try {
      res = await fetch(API, {
        method: 'PUT',
        headers: {
          Authorization: `Bearer ${getToken()}`,
          Accept: 'application/vnd.github+json',
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          message: `Atnaujinti valiutų kursai ${today}`,
          content: encodeB64(payload),
          sha: fileSha,
        }),
      });
    } catch(e) {
      setStatus('Tinklo klaida. Patikrinkite interneto ryšį.', 'error');
      btn.disabled = false;
      return;
    }

    btn.disabled = false;
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      setStatus(`Klaida: ${err.message || res.status}`, 'error');
      return;
    }
    const result = await res.json();
    fileSha = result.content.sha;
    setStatus('✓ Paskelbta! Svetainė atsinaujins per ~1 minutę.', 'success');
  }

  // Init
  if (getToken()) {
    showTokenSaved();
    loadRates();
  }
</script>
</body>
</html>
